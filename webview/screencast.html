<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #1e1e1e; }
    #screencast { width: 100%; height: calc(100vh - 40px); border: none; }
    #toolbar {
      height: 40px; display: flex; align-items: center; gap: 8px;
      padding: 0 12px; background: #252526; border-top: 1px solid #3c3c3c;
    }
    button {
      padding: 4px 12px; border: 1px solid #555; border-radius: 3px;
      background: #0e639c; color: white; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #1177bb; }
    button.danger { background: #c72e2e; }
    button.danger:hover { background: #e03e3e; }
    #status { color: #ccc; font-size: 13px; margin-left: auto; }
  </style>
</head>
<body>
  <iframe id="screencast" src="{{SHOW_URL}}"></iframe>
  <div id="toolbar">
    <button id="btn-run-file" onclick="postMessage('runFile')">Run File</button>
    <button id="btn-run-suite" onclick="postMessage('runSuite')">Run Suite</button>
    <button id="btn-stop" class="danger" onclick="postMessage('stop')">Stop</button>
    <span id="status">Ready</span>
  </div>
  <script>
    const vscode = acquireVsCodeApi();
    function postMessage(command) { vscode.postMessage({ command }); }
    window.addEventListener("message", (e) => {
      if (e.data?.status) {
        document.getElementById("status").textContent = e.data.status;
      }
    });
  </script>
</body>
</html>
